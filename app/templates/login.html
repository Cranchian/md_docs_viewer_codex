<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{PROJECT_TITLE}} — Sign in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:            #06030F;
    --bg-deep:       #040108;
    --bg-panel:      #0F0820;
    --bg-elevated:   #1A0F33;
    --border:        rgba(168, 85, 247, 0.18);
    --border-strong: rgba(192, 132, 252, 0.35);
    --accent:        #A855F7;
    --accent-hi:     #C084FC;
    --accent-deep:   #7C3AED;
    --gold:          #FBE5A4;
    --text-1:        #E9E4F5;
    --text-2:        #9C8FB8;
    --text-3:        #6B5F87;
    --green:         #4ADE80;
    --red:           #EF4444;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%; background: var(--bg); color: var(--text-1);
    font-family: 'DM Sans', sans-serif; font-size: 15px; line-height: 1.6;
  }
  body {
    background-image: linear-gradient(180deg, var(--bg) 0%, #0A0518 100%);
    overflow: auto; position: relative;
  }
  body::before {
    content: '';
    position: fixed; left: 50%; top: 32%;
    width: 540px; height: 540px;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, rgba(168,85,247,0.13), transparent 65%);
    filter: blur(8px);
    z-index: 0; pointer-events: none;
  }
  .wrap {
    min-height: 100%; display: grid; place-items: center; padding: 24px;
    position: relative; z-index: 1;
  }
  .card {
    background: linear-gradient(180deg, rgba(15,8,32,0.92) 0%, rgba(10,5,24,0.92) 100%);
    border: 1px solid var(--border-strong);
    border-radius: 16px;
    padding: 32px 32px 26px;
    max-width: 420px; width: 100%;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.04),
      0 0 0 1px rgba(168,85,247,0.08),
      0 30px 80px -16px rgba(0,0,0,0.7),
      0 0 60px rgba(168,85,247,0.10);
    backdrop-filter: blur(20px) saturate(140%);
    -webkit-backdrop-filter: blur(20px) saturate(140%);
  }

  .brand {
    display: flex; align-items: center; gap: 14px;
    padding-bottom: 20px; margin-bottom: 18px;
    border-bottom: 1px solid var(--border);
  }
  .sigil {
    width: 38px; height: 38px; flex-shrink: 0;
    display: grid; place-items: center;
    background: radial-gradient(circle at 30% 30%, rgba(192,132,252,0.28), rgba(168,85,247,0.05) 60%, transparent 75%);
    border: 1px solid var(--border-strong);
    border-radius: 10px;
    box-shadow:
      inset 0 0 0 1px rgba(255,255,255,0.04),
      0 0 24px -4px rgba(168,85,247,0.55);
    color: var(--accent-hi);
  }
  .word { display: flex; flex-direction: column; gap: 5px; line-height: 1; }
  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 500;
    letter-spacing: .28em; text-transform: uppercase;
    color: var(--accent); opacity: .9;
  }
  .wordmark {
    font-family: 'Syne', sans-serif;
    font-weight: 700; font-size: 20px;
    letter-spacing: .18em; text-transform: uppercase;
    background: linear-gradient(180deg, var(--text-1) 0%, #b8b0d8 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent; color: transparent;
    text-shadow: 0 0 24px rgba(192,132,252,0.22);
  }

  /* Tabs */
  .tabs {
    display: grid; grid-template-columns: 1fr 1fr;
    background: rgba(6,3,15,0.5);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 4px;
    margin-bottom: 22px;
  }
  .tab {
    padding: 9px 12px; border: 0; background: transparent;
    color: var(--text-3); cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px; font-weight: 600;
    letter-spacing: .22em; text-transform: uppercase;
    border-radius: 999px;
    transition: color .15s, background .15s, box-shadow .15s;
  }
  .tab.active {
    color: var(--text-1);
    background: linear-gradient(180deg, rgba(168,85,247,0.18), rgba(124,58,237,0.18));
    box-shadow: inset 0 0 0 1px var(--border-strong), 0 0 22px -8px rgba(192,132,252,0.5);
  }
  .tab:hover:not(.active) { color: var(--text-2); }

  .pane { display: none; }
  .pane.active { display: block; }

  .lead {
    font-family: 'Syne', sans-serif; font-weight: 600;
    font-size: 20px; color: var(--text-1); letter-spacing: -.01em;
    margin-bottom: 4px;
  }
  .lead-sub {
    font-size: 12.5px; color: var(--text-2);
    margin-bottom: 18px;
  }
  label {
    display: block; font-size: 10.5px; font-weight: 600;
    letter-spacing: .18em; text-transform: uppercase;
    color: var(--text-3); margin-top: 14px; margin-bottom: 6px;
    font-family: 'JetBrains Mono', monospace;
  }
  label .hint { text-transform: none; letter-spacing: 0; opacity: .65; }
  input {
    width: 100%; background: rgba(6,3,15,0.6);
    border: 1px solid var(--border);
    border-radius: 10px; padding: 11px 13px; color: var(--text-1);
    font: inherit; font-size: 14px; outline: none;
    transition: border-color .15s, box-shadow .15s, background .15s;
  }
  input::placeholder { color: var(--text-3); }
  input:focus {
    border-color: var(--border-strong);
    box-shadow: 0 0 0 3px rgba(168,85,247,0.18);
    background: rgba(15,8,32,0.85);
  }
  /* honeypot */
  .hp {
    position: absolute; left: -9999px; height: 0; width: 0;
    opacity: 0; pointer-events: none;
  }
  /* challenge row */
  .challenge-row {
    display: grid; grid-template-columns: 1fr 100px; gap: 10px; align-items: end;
  }
  .challenge-row .q {
    background: rgba(6,3,15,0.6); border: 1px solid var(--border);
    border-radius: 10px; padding: 11px 13px;
    font-family: 'JetBrains Mono', monospace; font-size: 14px;
    color: var(--text-1); letter-spacing: .04em; min-height: 42px;
    display: grid; place-items: center;
  }
  button.submit {
    width: 100%; margin-top: 22px;
    height: 44px; padding: 0 16px;
    background: linear-gradient(180deg, var(--accent-hi) 0%, var(--accent-deep) 100%);
    color: white; border: 1px solid var(--accent);
    border-radius: 999px;
    font-family: 'Syne', sans-serif; font-weight: 600;
    font-size: 12.5px; letter-spacing: .22em; text-transform: uppercase;
    cursor: pointer;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.18),
      0 8px 24px -6px rgba(124,58,237,0.55),
      0 0 22px rgba(168,85,247,0.35);
    transition: transform .08s, box-shadow .15s, filter .15s;
  }
  button.submit:hover {
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.22),
      0 12px 30px -6px rgba(124,58,237,0.7),
      0 0 32px rgba(192,132,252,0.5);
  }
  button.submit:active { transform: translateY(1px); }
  button.submit:disabled { opacity: .55; cursor: not-allowed; }

  .err {
    margin-top: 14px; padding: 10px 12px; border-radius: 10px;
    background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.32);
    color: #fda4a4; font-size: 12.5px;
  }
  .ok {
    margin-top: 14px; padding: 10px 12px; border-radius: 10px;
    background: rgba(74,222,128,0.08); border: 1px solid rgba(74,222,128,0.32);
    color: #a7f3d0; font-size: 12.5px;
  }
  .foot {
    margin-top: 22px; padding-top: 16px;
    border-top: 1px solid var(--border);
    text-align: center;
    font-size: 10px; letter-spacing: .26em; text-transform: uppercase;
    color: var(--text-3); font-family: 'JetBrains Mono', monospace;
  }
  .foot .gold { color: var(--gold); opacity: .8; }

  @media (max-width: 480px) {
    .card { padding: 26px 22px 22px; }
    .lead { font-size: 18px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="brand">
      <div class="sigil" aria-hidden="true">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M3.5 5.5C3.5 4.67 4.17 4 5 4h7.5l4 3v8.5c0 .83-.67 1.5-1.5 1.5H5c-.83 0-1.5-.67-1.5-1.5V5.5Z"
                stroke="currentColor" stroke-width="1.1" stroke-linejoin="round"/>
          <path d="M12.5 4v3.5h4" stroke="currentColor" stroke-width="1.1" stroke-linejoin="round"/>
          <path d="M6.2 9h6.6M6.2 11.5h6.6M6.2 14h4.2"
                stroke="currentColor" stroke-width="1" stroke-linecap="round" opacity=".75"/>
          <path d="M15.7 2.2l.5 1.4 1.4.5-1.4.5-.5 1.4-.5-1.4-1.4-.5 1.4-.5z" fill="#FBE5A4" opacity=".95"/>
        </svg>
      </div>
      <div class="word">
        <span class="eyebrow">Ccodex</span>
        <span class="wordmark">{{PROJECT_TITLE}}</span>
      </div>
    </div>

    <div class="tabs" role="tablist">
      <button class="tab active" data-tab="signin" role="tab">Sign in</button>
      <button class="tab" data-tab="signup" role="tab">Create</button>
    </div>

    <!-- SIGN IN PANE -->
    <div class="pane active" data-pane="signin">
      <div class="lead">Welcome back.</div>
      <div class="lead-sub">Sign in to your library.</div>
      <form id="f-signin" autocomplete="on">
        <label for="u-in">Username</label>
        <input id="u-in" name="username" autocomplete="username" autofocus required spellcheck="false">
        <label for="p-in">Password</label>
        <input id="p-in" name="password" type="password" autocomplete="current-password" required>
        <button type="submit" id="b-in" class="submit">Enter</button>
      </form>
      <div id="e-in"></div>
    </div>

    <!-- SIGN UP PANE -->
    <div class="pane" data-pane="signup">
      <div class="lead">Create an account.</div>
      <div class="lead-sub">Your docs, your space. Free to make.</div>
      <form id="f-signup" autocomplete="off">
        <label for="u-up">Username <span class="hint">— 3–20 chars, letters · digits · _ · -</span></label>
        <input id="u-up" name="username" required spellcheck="false" minlength="3" maxlength="20"
               pattern="[A-Za-z0-9_-]+">
        <label for="p-up">Password <span class="hint">— at least 8 characters</span></label>
        <input id="p-up" name="password" type="password" autocomplete="new-password" required minlength="8">

        <label>Verify <span class="hint">— quick check, not a bot</span></label>
        <div class="challenge-row">
          <div class="q" id="ch-q">Loading…</div>
          <input id="ch-a" name="challenge_answer" inputmode="numeric" pattern="-?[0-9]+" required>
        </div>

        <!-- honeypot, hidden from real users -->
        <input class="hp" type="text" name="website" tabindex="-1" autocomplete="off" aria-hidden="true">

        <button type="submit" id="b-up" class="submit">Create account</button>
      </form>
      <div id="e-up"></div>
    </div>

    <p class="foot">Stays signed in · <span class="gold">10 days</span></p>
  </div>
</div>
<script>
  function escapeHtml(s){return String(s).replace(/[<>&"]/g,function(c){return({"<":"&lt;",">":"&gt;","&":"&amp;","\"":"&quot;"})[c];});}

  function urlSearch(){return new URLSearchParams(location.search);}
  // Default to the app's own URL (e.g. /docs/), NOT the domain root — the login
  // page is served in-place at the gated path, so reloading it lands in the app.
  function returnPath(){ const r = urlSearch().get('return'); return r && r.startsWith('/') ? r : (location.pathname + location.search); }

  // --- tab switching with hash persistence ---
  const tabs = document.querySelectorAll('.tab');
  const panes = document.querySelectorAll('.pane');
  let challengeToken = null;

  async function loadChallenge() {
    const q = document.getElementById('ch-q');
    const a = document.getElementById('ch-a');
    q.textContent = 'Loading…';
    a.value = '';
    challengeToken = null;
    try {
      const r = await fetch('api/auth/challenge', {credentials: 'same-origin'});
      const j = await r.json();
      q.textContent = j.question;
      challengeToken = j.token;
    } catch (_) {
      q.textContent = 'Could not load challenge';
    }
  }

  function selectTab(name) {
    tabs.forEach(t => t.classList.toggle('active', t.dataset.tab === name));
    panes.forEach(p => p.classList.toggle('active', p.dataset.pane === name));
    if (name === 'signup' && !challengeToken) loadChallenge();
    if (name === 'signup') setTimeout(() => document.getElementById('u-up').focus(), 30);
    if (name === 'signin') setTimeout(() => document.getElementById('u-in').focus(), 30);
    history.replaceState(null, '', '#' + name);
  }
  tabs.forEach(t => t.addEventListener('click', () => selectTab(t.dataset.tab)));
  if (location.hash === '#signup') selectTab('signup');

  // --- sign in ---
  const fIn = document.getElementById('f-signin');
  const bIn = document.getElementById('b-in');
  const eIn = document.getElementById('e-in');
  fIn.addEventListener('submit', async function(ev){
    ev.preventDefault();
    eIn.innerHTML = ''; bIn.disabled = true;
    const label = bIn.textContent; bIn.textContent = 'Checking…';
    try {
      const fd = new FormData(fIn);
      const res = await fetch('api/auth/login', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({username: fd.get('username'), password: fd.get('password')}),
        credentials: 'same-origin',
      });
      if (res.ok) { location.assign(returnPath()); return; }
      let msg = 'Invalid credentials.';
      try { const j = await res.json(); if (j && j.error) msg = j.error; } catch(_) {}
      eIn.innerHTML = '<div class="err">' + escapeHtml(msg) + '</div>';
    } catch (err) {
      eIn.innerHTML = '<div class="err">Network error. Try again.</div>';
    } finally {
      bIn.disabled = false; bIn.textContent = label;
    }
  });

  // --- sign up ---
  const fUp = document.getElementById('f-signup');
  const bUp = document.getElementById('b-up');
  const eUp = document.getElementById('e-up');
  fUp.addEventListener('submit', async function(ev){
    ev.preventDefault();
    eUp.innerHTML = ''; bUp.disabled = true;
    const label = bUp.textContent; bUp.textContent = 'Creating…';
    try {
      const fd = new FormData(fUp);
      const claim = urlSearch().get('claim') || '';
      const res = await fetch('api/auth/signup', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          username: fd.get('username'),
          password: fd.get('password'),
          website: fd.get('website') || '',
          challenge_token: challengeToken || '',
          challenge_answer: fd.get('challenge_answer'),
          claim_link: claim,
        }),
        credentials: 'same-origin',
      });
      if (res.ok) { location.assign(returnPath()); return; }
      let msg = 'Sign up failed.';
      try { const j = await res.json(); if (j && j.error) msg = j.error; } catch(_) {}
      eUp.innerHTML = '<div class="err">' + escapeHtml(msg) + '</div>';
      // Refresh challenge on any failure so the user gets a fresh question.
      loadChallenge();
    } catch (err) {
      eUp.innerHTML = '<div class="err">Network error. Try again.</div>';
    } finally {
      bUp.disabled = false; bUp.textContent = label;
    }
  });
</script>
</body>
</html>
